<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="#000000"/>

  <!-- Ground line -->
  <line
    x1="96" y1="330"
    x2="416" y2="330"
    stroke="#1a4a14"
    stroke-width="6"
    stroke-linecap="round"
  />

  <!-- Root mass below ground -->
  <ellipse
    cx="256" cy="342"
    rx="48" ry="28"
    fill="#1a4a14"
  />

  <!-- Stem — square cap for a blunt sharp finish -->
  <line
    x1="256" y1="330"
    x2="256" y2="140"
    stroke="#2d6b24"
    stroke-width="14"
    stroke-linecap="square"
  />

  <!-- Left leaf — larger, lower on stem -->
  <path
    d="M250,255 C220,240 168,215 158,188 C185,192 235,210 252,228 Z"
    fill="#3a8c30"
  />

  <!-- Right leaf — slightly smaller, higher on stem -->
  <path
    d="M262,205 C292,188 340,158 352,130 C326,138 278,162 260,182 Z"
    fill="#2d6b24"
  />

</svg>
